<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#fff;color:#1e293b;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:15px;line-height:1.6}
#editor-wrap{padding:16px 16px 120px;background:#ffffff}
.ProseMirror{min-height:300px;outline:none}
.ProseMirror>*+*{margin-top:0.6em}
.ProseMirror p{margin:0}
.ProseMirror h1{font-size:1.6em;font-weight:700;line-height:1.3}
.ProseMirror h2{font-size:1.3em;font-weight:700;line-height:1.3}
.ProseMirror h3{font-size:1.1em;font-weight:700;line-height:1.3}
.ProseMirror ul,.ProseMirror ol{padding-left:1.4em}
.ProseMirror ul[data-type="taskList"]{list-style:none;padding-left:0.4em}
.ProseMirror ul[data-type="taskList"] li{display:flex;align-items:flex-start;gap:8px;padding-left:0}
.ProseMirror ul[data-type="taskList"] li>label{flex-shrink:0;margin-top:3px}
.ProseMirror ul[data-type="taskList"] li>label input[type="checkbox"]{width:16px;height:16px;cursor:pointer;accent-color:#2563eb}
.ProseMirror ul[data-type="taskList"] li>div{flex:1}
.ProseMirror li>p{margin:0}
.ProseMirror code{background:#f1f5f9;padding:2px 5px;border-radius:3px;font-family:monospace;font-size:0.87em}
.ProseMirror pre{background:#f1f5f9;padding:12px 16px;border-radius:8px;overflow-x:auto}
.ProseMirror pre code{background:none;padding:0}
.ProseMirror blockquote{border-left:3px solid #e2e8f0;padding-left:1em;color:#64748b;font-style:italic}
.ProseMirror hr{border:none;border-top:2px solid #e2e8f0;margin:1em 0}
.ProseMirror a{color:#2563eb;text-decoration:underline}
.ProseMirror table{border-collapse:collapse;margin-bottom:0.6em;overflow:auto;display:block;white-space:nowrap}
.ProseMirror th,.ProseMirror td{border:1px solid #e2e8f0;padding:7px 12px;text-align:left;min-width:60px;white-space:normal}
.ProseMirror th{background:#f8fafc;font-weight:600}
.ProseMirror td,.ProseMirror th{position:relative}
.ProseMirror .selectedCell:after{background:rgba(37,99,235,.12);content:"";position:absolute;left:0;right:0;top:0;bottom:0;pointer-events:none;z-index:2}
.ProseMirror .is-editor-empty:first-child::before{content:attr(data-placeholder);color:#94a3b8;pointer-events:none;float:left;height:0}
#status{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;background:#fff;font-size:14px;color:#94a3b8;flex-direction:column;gap:8px}
#spinner{width:24px;height:24px;border:3px solid #e2e8f0;border-top-color:#2563eb;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#toolbar{position:fixed;bottom:0;left:0;right:0;background:#ffffff;border-top:1px solid #e2e8f0;padding:6px 8px;display:none;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;z-index:1000;-webkit-transform:translateZ(0);transform:translateZ(0);will-change:bottom}
.tb{display:inline-block;padding:6px 10px;margin:2px;border-radius:6px;border:1px solid #e2e8f0;background:#fff;font-size:13px;color:#374151;cursor:pointer;user-select:none;-webkit-user-select:none;vertical-align:middle}
.tb.active{background:#eff6ff;border-color:#2563eb;color:#2563eb;font-weight:600}
.tb-sep{display:inline-block;width:1px;height:24px;background:#e2e8f0;margin:2px 4px;vertical-align:middle}
</style>
</head>
<body>
<div id="status"><div id="spinner"></div><span>Загрузка редактора...</span></div>
<div id="toolbar"></div>
<div id="editor-wrap" style="display:none"><div id="editor"></div></div>

<script src="editor-bundle.js"></script>
<script>
(function(){
  var editor=null;

  function post(d){
    if(window.ReactNativeWebView) window.ReactNativeWebView.postMessage(JSON.stringify(d));
  }

  function updateToolbar(){
    if(!editor) return;
    document.querySelectorAll('.tb[data-cmd]').forEach(function(btn){
      var cmd=btn.dataset.cmd;
      var active=false;
      if(cmd==='bold') active=editor.isActive('bold');
      else if(cmd==='italic') active=editor.isActive('italic');
      else if(cmd==='h1') active=editor.isActive('heading',{level:1});
      else if(cmd==='h2') active=editor.isActive('heading',{level:2});
      else if(cmd==='h3') active=editor.isActive('heading',{level:3});
      else if(cmd==='ul') active=editor.isActive('bulletList');
      else if(cmd==='ol') active=editor.isActive('orderedList');
      else if(cmd==='task') active=editor.isActive('taskList');
      else if(cmd==='code') active=editor.isActive('codeBlock');
      btn.classList.toggle('active',active);
    });
  }

  function execCmd(cmd){
    if(!editor) return;
    var c=editor.chain().focus();
    if(cmd==='bold') c.toggleBold().run();
    else if(cmd==='italic') c.toggleItalic().run();
    else if(cmd==='h1') c.toggleHeading({level:1}).run();
    else if(cmd==='h2') c.toggleHeading({level:2}).run();
    else if(cmd==='h3') c.toggleHeading({level:3}).run();
    else if(cmd==='ul') c.toggleBulletList().run();
    else if(cmd==='ol') c.toggleOrderedList().run();
    else if(cmd==='task') c.toggleTaskList().run();
    else if(cmd==='code') c.toggleCodeBlock().run();
    else if(cmd==='table') c.insertTable({rows:3,cols:3,withHeaderRow:true}).run();
    else if(cmd==='addrow') c.addRowAfter().run();
    else if(cmd==='addcol') c.addColumnAfter().run();
    else if(cmd==='delrow') c.deleteRow().run();
    else if(cmd==='delcol') c.deleteColumn().run();
    else if(cmd==='deltable') c.deleteTable().run();
    updateToolbar();
  }

  function buildToolbar(){
    var tb=document.getElementById('toolbar');
    var items=[
      {cmd:'bold',label:'<b>B</b>'},
      {cmd:'italic',label:'<i>I</i>'},
      {sep:true},
      {cmd:'h1',label:'H1'},{cmd:'h2',label:'H2'},{cmd:'h3',label:'H3'},
      {sep:true},
      {cmd:'ul',label:'&#8226; Список'},
      {cmd:'ol',label:'1. Список'},
      {cmd:'task',label:'&#9744; Задачи'},
      {cmd:'code',label:'&lt;/&gt;'},
      {sep:true},
      {cmd:'table',label:'Таблица'},
      {cmd:'addrow',label:'+Строка'},
      {cmd:'addcol',label:'+Столбец'},
      {cmd:'delrow',label:'&#8722;Строка'},
      {cmd:'delcol',label:'&#8722;Столбец'},
      {cmd:'deltable',label:'Удалить таблицу'}
    ];
    items.forEach(function(item){
      if(item.sep){
        var s=document.createElement('span');
        s.className='tb-sep';
        tb.appendChild(s);
      } else {
        var btn=document.createElement('button');
        btn.className='tb';
        btn.dataset.cmd=item.cmd;
        btn.innerHTML=item.label;
        btn.addEventListener('click',function(){execCmd(item.cmd);});
        tb.appendChild(btn);
      }
    });
    tb.style.display='block';
  }

  var _initialized=false;
  function initEditor(content,readOnly){
    if(_initialized) return;
    _initialized=true;
    var T=window.TipTap;
    editor=new T.Editor({
      element:document.getElementById('editor'),
      extensions:[
        T.StarterKit,
        T.Table.configure({resizable:false}),
        T.TableRow,
        T.TableHeader,
        T.TableCell,
        T.TaskList,
        T.TaskItem.configure({nested:true}),
        T.Markdown.configure({html:false,transformCopiedText:true,transformPastedText:true}),
      ],
      content:content||'',
      editable:!readOnly,
      onUpdate:function(){post({type:'changed'});},
      onSelectionUpdate:function(){updateToolbar();},
    });
    window.editor=editor;
    document.getElementById('status').style.display='none';
    document.getElementById('editor-wrap').style.display='block';
    if(!readOnly) buildToolbar();
    post({type:'ready'});
  }

  // Exposed for direct invocation via injectJavaScript from native onLoadEnd.
  // This path does not depend on window.ReactNativeWebView or postMessage working,
  // which is required on iOS where the bridge is unavailable on file:// origins.
  window._editorInit=function(content,readOnly){initEditor(content,readOnly||false);};

  // iOS does NOT resize the WebView when the keyboard appears — the keyboard overlays
  // the bottom of the page. Use the Visual Viewport API to push the toolbar above it.
  (function() {
    var tb = document.getElementById('toolbar');
    function onVpResize() {
      if (!window.visualViewport) return;
      var offsetFromBottom = window.innerHeight - window.visualViewport.height - window.visualViewport.offsetTop;
      var kbHeight = Math.max(0, offsetFromBottom);
      tb.style.bottom = kbHeight + 'px';
      // Keep editor-wrap paddingBottom in sync so content isn't hidden under toolbar+keyboard
      var tbH = tb.offsetHeight || 44;
      document.getElementById('editor-wrap').style.paddingBottom = (tbH + kbHeight + 20) + 'px';
    }
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', onVpResize);
      window.visualViewport.addEventListener('scroll', onVpResize);
    }
  })();

  function handleMsg(event){
    try{
      var msg=JSON.parse(event.data);
      if(msg.cmd==='init'){
        initEditor(msg.content,msg.readOnly||false);
      } else if(msg.cmd==='getContent'){
        var md=editor?editor.storage.markdown.getMarkdown():'';
        post({type:'content',markdown:md});
      } else if(msg.cmd==='setReadOnly'){
        if(editor) editor.setEditable(!msg.value);
      }
    }catch(e){}
  }
  document.addEventListener('message',handleMsg);
  window.addEventListener('message',handleMsg);

  // Signal bundle loaded
  post({type:'scriptLoaded'});
})();
</script>
</body>
</html>
