name: iOS Build & Deploy

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'mobile/**'
      - '.github/workflows/ios-build.yml'

concurrency:
  group: ios-build
  cancel-in-progress: true

jobs:
  ios:
    name: Build & Submit iOS
    # Метка macOS разводит iOS-сборку с web-деплоем (тот идёт на runner Linux).
    runs-on: [self-hosted, macOS]
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: mobile
        run: npm ci && npm install -g eas-cli

      - name: Unlock login keychain
        run: security unlock-keychain -p "${{ secrets.MAC_KEYCHAIN_PASSWORD }}" "$HOME/Library/Keychains/login.keychain-db"

      - name: Grant keychain access to code signing tools (macOS 14 fix)
        # Устраняет зависание "security find-identity -v -s" на macOS 14+:
        # без set-key-partition-list macOS запрашивает разрешение на доступ к каждому ключу —
        # в неинтерактивной среде это зависание на десятки минут.
        run: |
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "${{ secrets.MAC_KEYCHAIN_PASSWORD }}" \
            "$HOME/Library/Keychains/login.keychain-db"
          # Снимаем авто-блокировку login.keychain на время сборки (до 8 часов),
          # чтобы keychain не заблокировался во время долгого pod install + xcodebuild archive.
          security set-keychain-settings -lut 28800 "$HOME/Library/Keychains/login.keychain-db"

      - name: Install Apple WWDR certificates
        run: |
          for CERT in AppleWWDRCAG4.cer AppleWWDRCAG5.cer AppleWWDRCAG6.cer; do
            curl -fsSL -o /tmp/$CERT "https://www.apple.com/certificateauthority/$CERT" && \
              security import /tmp/$CERT -k ~/Library/Keychains/login.keychain-db 2>&1 | grep -v "already exists" || true
            rm -f /tmp/$CERT
          done

      - name: Set iOS build number
        working-directory: mobile
        run: |
          python3 -c "
          import json
          with open('app.json') as f:
              cfg = json.load(f)
          cfg['expo'].setdefault('ios', {})['buildNumber'] = '${{ github.run_number }}'
          with open('app.json', 'w') as f:
              json.dump(cfg, f, indent=2, ensure_ascii=False)
          print('Build number set to: ${{ github.run_number }}')
          "

      # EAS создаёт временный keychain с СЛУЧАЙНЫМ паролем → мы не можем вызвать
      # security set-key-partition-list без него → codesign получает errSecInternalComponent.
      #
      # Решение: устанавливаем обёртку /usr/local/bin/security (перехватчик),
      # которая перехватывает вызов `security create-keychain -p <pass> <path>`,
      # сохраняет пароль в /tmp/eas-kc-pass-<keychain-name>.txt, а затем передаёт
      # вызов реальному /usr/bin/security без изменений.
      # Фоновый watcher читает этот файл и вызывает set-key-partition-list с верным паролем.
      - name: Install security interceptor for EAS keychain password
        run: |
          python3 - << 'PYEOF'
import os, stat
script = r"""#!/bin/bash
# Intercept 'security create-keychain' to capture the random password EAS uses.
# This allows our keychain watcher to call set-key-partition-list correctly.
if [ "$1" = "create-keychain" ]; then
    prev=""
    kc_pass=""
    kc_path=""
    for arg in "$@"; do
        if [ "$prev" = "-p" ]; then kc_pass="$arg"; fi
        case "$arg" in *eas-build-*.keychain*) kc_path="$arg";; esac
        prev="$arg"
    done
    if [ -n "$kc_path" ] && [ -n "$kc_pass" ]; then
        printf '%s' "$kc_pass" > "/tmp/eas-kc-pass-${kc_path##*/}.txt"
    fi
fi
exec /usr/bin/security "$@"
"""
path = "/usr/local/bin/security"
with open(path, "w") as f:
    f.write(script)
os.chmod(path, stat.S_IRWXU | stat.S_IRGRP | stat.S_IXGRP | stat.S_IROTH | stat.S_IXOTH)
print("Security interceptor installed at " + path)
PYEOF

      - name: Start EAS keychain auto-lock prevention
        run: |
          (
            SEEN_FILE=$(mktemp)
            while true; do
              find "$HOME/Library/Keychains" /var/folders \
                -maxdepth 6 \
                \( -name "eas-build-*.keychain" -o -name "eas-build-*.keychain-db" \) \
                2>/dev/null | while IFS= read -r kc; do
                [ -z "$kc" ] && continue
                grep -qF "$kc" "$SEEN_FILE" 2>/dev/null && continue

                KC_NAME="${kc##*/}"
                PASS_FILE="/tmp/eas-kc-pass-${KC_NAME}.txt"

                # Если файл с паролем ещё не появился — EAS ещё не создал keychain.
                # Не помечаем как обработанный, проверим в следующей итерации.
                [ ! -f "$PASS_FILE" ] && continue

                echo "$kc" >> "$SEEN_FILE"
                KC_PASS=$(cat "$PASS_FILE")

                # 1. Продлить таймаут автоблокировки
                /usr/bin/security set-keychain-settings -t 86400 "$kc" 2>/dev/null && \
                  echo "[kc-watcher] Extended lock timeout: $kc" || true

                # 2. Разблокировать с перехваченным паролем
                /usr/bin/security unlock-keychain -p "$KC_PASS" "$kc" 2>/dev/null || true

                # 3. Установить partition list — главный фикс errSecInternalComponent
                if /usr/bin/security set-key-partition-list \
                    -S "apple-tool:,apple:,codesign:" \
                    -s -k "$KC_PASS" "$kc" 2>/dev/null; then
                  echo "[kc-watcher] Partition list set OK: $kc"
                else
                  echo "[kc-watcher] WARN: set-key-partition-list failed: $kc"
                fi
              done
              sleep 2
            done
          ) &
          echo $! > /tmp/eas-keychain-watcher.pid
          echo "[kc-watcher] Started (PID: $(cat /tmp/eas-keychain-watcher.pid))"

      # Сборка занимает ~15–30 минут. Лог пишется в /tmp/ios-build.log.
      - name: Build iOS (local)
        id: build
        working-directory: mobile
        run: |
          touch /tmp/build-start-marker
          # || true: EAS может вернуть non-zero из-за cleanup (ENOTEMPTY rmdir .git),
          # хотя IPA уже создан — проверяем наличие файла, а не exit code.
          eas build \
            --platform ios \
            --profile production \
            --local \
            --non-interactive \
            2>&1 | tee /tmp/ios-build.log || true
          IPA=$(find . -name "*.ipa" -newer /tmp/build-start-marker | head -1)
          if [ -z "$IPA" ]; then
            echo "::error::Build failed: IPA not produced"
            exit 1
          fi
          echo "IPA built: ${IPA}"
          echo "ipa_path=${IPA}" >> "$GITHUB_OUTPUT"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_BUILD_NO_EXPO_GO_WARNING: true

      - name: Submit to TestFlight
        if: success()
        working-directory: mobile
        run: |
          # Неинтерактивный submit требует App Store Connect API Key.
          # Без него eas submit зависает на "Looking up credentials configuration",
          # пытаясь авторизоваться через Apple ID (логин/2FA), что в CI невозможно.
          #
          # Материализуем .p8 из секрета (base64) и подставляем путь/ID/Issuer ID
          # в submit-профиль eas.json на лету — в репозиторий ничего не коммитим.
          python3 -c "
          import base64, json, os
          raw = os.environ['ASC_API_KEY_P8_BASE64'].strip()
          # Секрет может содержать либо сырой PEM (-----BEGIN...), либо base64 от него.
          # Оба варианта поддерживаем: пишем то, что получилось, в текстовом режиме.
          if raw.startswith('-----'):
              pem = raw
          else:
              pem = base64.b64decode(raw).decode('utf-8')
          with open('/tmp/asc_api_key.p8', 'w') as f:
              f.write(pem)
          with open('eas.json') as f:
              cfg = json.load(f)
          ios = cfg['submit']['production']['ios']
          ios['ascApiKeyPath']     = '/tmp/asc_api_key.p8'
          ios['ascApiKeyId']       = os.environ['ASC_KEY_ID']
          ios['ascApiKeyIssuerId'] = os.environ['ASC_ISSUER_ID']
          with open('eas.json', 'w') as f:
              json.dump(cfg, f, indent=2, ensure_ascii=False)
          print('ASC API Key подставлен в eas.json (ascApiKeyId=' + os.environ['ASC_KEY_ID'] + ')')
          "
          eas submit \
            --platform ios \
            --path "${{ steps.build.outputs.ipa_path }}" \
            --non-interactive
          rm -f /tmp/asc_api_key.p8
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}

      - name: Stop EAS keychain watcher
        if: always()
        run: |
          if [ -f /tmp/eas-keychain-watcher.pid ]; then
            kill "$(cat /tmp/eas-keychain-watcher.pid)" 2>/dev/null || true
          fi
          rm -f /usr/local/bin/security
          rm -f /tmp/eas-kc-pass-*.txt

      # Загружает лог в Delifile всегда — и при успехе, и при ошибке.
      # Имя файла содержит статус и временную метку: ios-build-success-20260605-143022.log
      - name: Upload log to Delifile
        if: always()
        env:
          DELIFILE_TOKEN: ${{ secrets.DELIFILE_TOKEN }}
        run: |
          LOG=/tmp/ios-build.log
          [ -f "$LOG" ] || echo "(сборка не запускалась)" > "$LOG"

          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          LOG_SIZE=$(wc -c < "$LOG" | tr -d ' ')
          BUILD_STATUS="${{ job.status }}"
          FILENAME="ios-build-${BUILD_STATUS}-${TIMESTAMP}.log"

          # Шаг 1: инициализация загрузки (в папку iOS Build Logs)
          FOLDER_ID="01kthtznmcakp23njmbv9vabw5"
          INIT=$(curl -sf -X POST "https://delifile.ru/api/v1/shared-folders/${FOLDER_ID}/init-upload" \
            -H "Authorization: Bearer ${DELIFILE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"original_name\": \"${FILENAME}\", \"size\": ${LOG_SIZE}, \"mime_type\": \"text/plain\"}")

          FILE_ID=$(echo "$INIT" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['file']['id'])")
          UPLOAD_URL=$(echo "$INIT" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['upload']['url'])")

          # Шаг 2: загрузка в S3
          curl -sf -X PUT "$UPLOAD_URL" \
            -H "Content-Type: text/plain" \
            --data-binary @"$LOG"

          # Шаг 3: завершение загрузки
          curl -sf -X POST "https://delifile.ru/api/v1/shared-folders/${FOLDER_ID}/complete-upload" \
            -H "Authorization: Bearer ${DELIFILE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"file_id\": \"${FILE_ID}\"}"

          echo "Лог загружен в Delifile: ${FILENAME}"
