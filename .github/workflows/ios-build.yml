name: iOS Build & Deploy

on:
  push:
    branches: [master]
    paths:
      - 'mobile/**'

jobs:
  ios:
    name: Build & Submit iOS
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci && npm install -g eas-cli

      - name: Unlock login keychain
        run: security unlock-keychain -p "${{ secrets.MAC_KEYCHAIN_PASSWORD }}" "$HOME/Library/Keychains/login.keychain-db"

      - name: Install Apple WWDR certificates
        run: |
          for CERT in AppleWWDRCAG4.cer AppleWWDRCAG5.cer AppleWWDRCAG6.cer; do
            curl -fsSL -o /tmp/$CERT "https://www.apple.com/certificateauthority/$CERT" && \
              security import /tmp/$CERT -k ~/Library/Keychains/login.keychain-db 2>&1 | grep -v "already exists" || true
            rm -f /tmp/$CERT
          done

      - name: Patch EAS keychain.js для macOS 14
        run: |
          KEYCHAIN_JS=$(find ~/.npm/_npx -name "keychain.js" -path "*/ios/credentials/keychain.js" 2>/dev/null | head -1)
          [ -z "$KEYCHAIN_JS" ] && echo "keychain.js not in cache yet" && exit 0
          echo "Patching: $KEYCHAIN_JS"
          python3 -c "
import sys
path = sys.argv[1]
with open(path) as f: c = f.read()
orig = c
q = chr(39)
old = q+'find-identity'+q+', '+q+'-v'+q+', '+q+'-s'+q
new = q+'find-identity'+q+', '+q+'-s'+q
c = c.replace(old, new)
if c != orig:
    open(path,'w').write(c)
    print('OK: -v removed from find-identity')
else:
    i = c.find('find-identity')
    print('WARN pattern not found, context:', repr(c[max(0,i-5):i+80]))
" "$KEYCHAIN_JS"

      # Сборка занимает ~15–30 минут. Лог пишется в /tmp/ios-build.log.
      - name: Build iOS (local)
        id: build
        working-directory: mobile
        run: |
          set -o pipefail
          touch /tmp/build-start-marker
          eas build \
            --platform ios \
            --profile production \
            --local \
            --non-interactive \
            2>&1 | tee /tmp/ios-build.log
          IPA=$(find . -name "*.ipa" -newer /tmp/build-start-marker | head -1)
          echo "ipa_path=${IPA}" >> "$GITHUB_OUTPUT"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_BUILD_NO_EXPO_GO_WARNING: true
          # Fastlane: вместо set-key-partition-list использовать -A флаг (fix для macOS 14)
          FL_IMPORT_CERTIFICATE_ALLOW_ANY_APP: 'true'

      - name: Submit to TestFlight
        if: success()
        working-directory: mobile
        run: |
          eas submit \
            --platform ios \
            --path "${{ steps.build.outputs.ipa_path }}" \
            --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # Загружает лог в Delifile всегда — и при успехе, и при ошибке.
      # Имя файла содержит статус и временную метку: ios-build-success-20260605-143022.log
      - name: Upload log to Delifile
        if: always()
        env:
          DELIFILE_TOKEN: ${{ secrets.DELIFILE_TOKEN }}
        run: |
          LOG=/tmp/ios-build.log
          [ -f "$LOG" ] || echo "(сборка не запускалась)" > "$LOG"

          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          LOG_SIZE=$(wc -c < "$LOG" | tr -d ' ')
          BUILD_STATUS="${{ job.status }}"
          FILENAME="ios-build-${BUILD_STATUS}-${TIMESTAMP}.log"

          # Шаг 1: инициализация загрузки
          INIT=$(curl -sf -X POST "https://delifile.ru/api/v1/files/init-upload" \
            -H "Authorization: Bearer ${DELIFILE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"original_name\": \"${FILENAME}\", \"size\": ${LOG_SIZE}, \"mime_type\": \"text/plain\"}")

          FILE_ID=$(echo "$INIT" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['file']['id'])")
          UPLOAD_URL=$(echo "$INIT" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['upload']['url'])")

          # Шаг 2: загрузка в S3
          curl -sf -X PUT "$UPLOAD_URL" \
            -H "Content-Type: text/plain" \
            --data-binary @"$LOG"

          # Шаг 3: завершение загрузки
          curl -sf -X POST "https://delifile.ru/api/v1/files/complete-upload" \
            -H "Authorization: Bearer ${DELIFILE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"file_id\": \"${FILE_ID}\"}"

          echo "Лог загружен в Delifile: ${FILENAME}"
