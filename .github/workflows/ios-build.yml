name: iOS Build & Deploy

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'mobile/**'
      - '.github/workflows/ios-build.yml'

concurrency:
  group: ios-build
  cancel-in-progress: true

jobs:
  ios:
    name: Build & Submit iOS
    # Метка macOS разводит iOS-сборку с web-деплоем (тот идёт на runner Linux).
    runs-on: [self-hosted, macOS]
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: mobile
        run: npm ci && npm install -g eas-cli

      - name: Unlock login keychain
        run: security unlock-keychain -p "${{ secrets.MAC_KEYCHAIN_PASSWORD }}" "$HOME/Library/Keychains/login.keychain-db"

      - name: Grant keychain access to code signing tools (macOS 14 fix)
        # Устраняет зависание "security find-identity -v -s" на macOS 14+:
        # без set-key-partition-list macOS запрашивает разрешение на доступ к каждому ключу —
        # в неинтерактивной среде это зависание на десятки минут.
        run: |
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "${{ secrets.MAC_KEYCHAIN_PASSWORD }}" \
            "$HOME/Library/Keychains/login.keychain-db"

      - name: Install Apple WWDR certificates
        run: |
          for CERT in AppleWWDRCAG4.cer AppleWWDRCAG5.cer AppleWWDRCAG6.cer; do
            curl -fsSL -o /tmp/$CERT "https://www.apple.com/certificateauthority/$CERT" && \
              security import /tmp/$CERT -k ~/Library/Keychains/login.keychain-db 2>&1 | grep -v "already exists" || true
            rm -f /tmp/$CERT
          done

      - name: Set iOS build number
        working-directory: mobile
        run: |
          python3 -c "
          import json
          with open('app.json') as f:
              cfg = json.load(f)
          cfg['expo'].setdefault('ios', {})['buildNumber'] = '${{ github.run_number }}'
          with open('app.json', 'w') as f:
              json.dump(cfg, f, indent=2, ensure_ascii=False)
          print('Build number set to: ${{ github.run_number }}')
          "

      # Сборка занимает ~15–30 минут. Лог пишется в /tmp/ios-build.log.
      - name: Build iOS (local)
        id: build
        working-directory: mobile
        run: |
          set -o pipefail
          touch /tmp/build-start-marker
          eas build \
            --platform ios \
            --profile production \
            --local \
            --non-interactive \
            2>&1 | tee /tmp/ios-build.log
          IPA=$(find . -name "*.ipa" -newer /tmp/build-start-marker | head -1)
          echo "ipa_path=${IPA}" >> "$GITHUB_OUTPUT"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_BUILD_NO_EXPO_GO_WARNING: true
          # Fastlane: вместо set-key-partition-list использовать -A флаг (fix для macOS 14)
          FL_IMPORT_CERTIFICATE_ALLOW_ANY_APP: 'true'

      - name: Submit to TestFlight
        if: success()
        working-directory: mobile
        run: |
          # Неинтерактивный submit требует App Store Connect API Key.
          # Без него eas submit зависает на "Looking up credentials configuration",
          # пытаясь авторизоваться через Apple ID (логин/2FA), что в CI невозможно.
          #
          # Материализуем .p8 из секрета (base64) и подставляем путь/ID/Issuer ID
          # в submit-профиль eas.json на лету — в репозиторий ничего не коммитим.
          python3 -c "
          import base64, json, os
          raw = os.environ['ASC_API_KEY_P8_BASE64'].strip()
          # Секрет может содержать либо сырой PEM (-----BEGIN...), либо base64 от него.
          # Оба варианта поддерживаем: пишем то, что получилось, в текстовом режиме.
          if raw.startswith('-----'):
              pem = raw
          else:
              pem = base64.b64decode(raw).decode('utf-8')
          with open('/tmp/asc_api_key.p8', 'w') as f:
              f.write(pem)
          with open('eas.json') as f:
              cfg = json.load(f)
          ios = cfg['submit']['production']['ios']
          ios['ascApiKeyPath']     = '/tmp/asc_api_key.p8'
          ios['ascApiKeyId']       = os.environ['ASC_KEY_ID']
          ios['ascApiKeyIssuerId'] = os.environ['ASC_ISSUER_ID']
          with open('eas.json', 'w') as f:
              json.dump(cfg, f, indent=2, ensure_ascii=False)
          print('ASC API Key подставлен в eas.json (ascApiKeyId=' + os.environ['ASC_KEY_ID'] + ')')
          "
          eas submit \
            --platform ios \
            --path "${{ steps.build.outputs.ipa_path }}" \
            --non-interactive
          rm -f /tmp/asc_api_key.p8
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}

      # Загружает лог в Delifile всегда — и при успехе, и при ошибке.
      # Имя файла содержит статус и временную метку: ios-build-success-20260605-143022.log
      - name: Upload log to Delifile
        if: always()
        env:
          DELIFILE_TOKEN: ${{ secrets.DELIFILE_TOKEN }}
        run: |
          LOG=/tmp/ios-build.log
          [ -f "$LOG" ] || echo "(сборка не запускалась)" > "$LOG"

          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          LOG_SIZE=$(wc -c < "$LOG" | tr -d ' ')
          BUILD_STATUS="${{ job.status }}"
          FILENAME="ios-build-${BUILD_STATUS}-${TIMESTAMP}.log"

          # Шаг 1: инициализация загрузки (в папку iOS Build Logs)
          FOLDER_ID="01kthtznmcakp23njmbv9vabw5"
          INIT=$(curl -sf -X POST "https://delifile.ru/api/v1/shared-folders/${FOLDER_ID}/init-upload" \
            -H "Authorization: Bearer ${DELIFILE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"original_name\": \"${FILENAME}\", \"size\": ${LOG_SIZE}, \"mime_type\": \"text/plain\"}")

          FILE_ID=$(echo "$INIT" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['file']['id'])")
          UPLOAD_URL=$(echo "$INIT" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['upload']['url'])")

          # Шаг 2: загрузка в S3
          curl -sf -X PUT "$UPLOAD_URL" \
            -H "Content-Type: text/plain" \
            --data-binary @"$LOG"

          # Шаг 3: завершение загрузки
          curl -sf -X POST "https://delifile.ru/api/v1/shared-folders/${FOLDER_ID}/complete-upload" \
            -H "Authorization: Bearer ${DELIFILE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"file_id\": \"${FILE_ID}\"}"

          echo "Лог загружен в Delifile: ${FILENAME}"
